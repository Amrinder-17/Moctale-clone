{% extends "layout.html" %}
{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'movies/style.css' %}">
{% endblock %}

{% block nav_active_explore %}{% endblock %}
{% block nav_active_schedule %}active{% endblock %}

{% block content %}
<div class="schedule-page-shell">
    <div class="schedule-page-layout">

        <!-- Left sidebar: platform / release source filters -->
        <aside class="schedule-sidebar d-none d-md-block">
            <nav class="schedule-source-nav">
                <button type="button" class="schedule-source-btn active" data-source="cinemas">
                    <i class="bi bi-ticket-perforated"></i>
                    <span>In Cinemas</span>
                </button>
                <button type="button" class="schedule-source-btn" data-source="netflix">
                    <i class="bi bi-play-btn"></i>
                    <span>Netflix</span>
                </button>
                <button type="button" class="schedule-source-btn" data-source="crunchyroll">
                    <i class="bi bi-tv"></i>
                    <span>Crunchyroll</span>
                </button>
                <button type="button" class="schedule-source-btn" data-source="prime">
                    <i class="bi bi-amazon"></i>
                    <span>Prime Video</span>
                </button>
                <button type="button" class="schedule-source-btn" data-source="upcoming">
                    <i class="bi bi-calendar-event"></i>
                    <span>Upcoming</span>
                </button>
            </nav>
        </aside>

        <!-- Main content -->
        <main class="schedule-main">

            <!-- Mobile source tabs -->
            <div class="schedule-mobile-sources d-md-none">
                <button type="button" class="schedule-source-btn active" data-source="cinemas">In Cinemas</button>
                <button type="button" class="schedule-source-btn" data-source="netflix">Netflix</button>
                <button type="button" class="schedule-source-btn" data-source="crunchyroll">Crunchyroll</button>
                <button type="button" class="schedule-source-btn" data-source="prime">Prime Video</button>
                <button type="button" class="schedule-source-btn" data-source="upcoming">Upcoming</button>
            </div>

            <!-- Media type filter pills -->
            <div class="schedule-media-filter">
                <button type="button" class="media-filter-btn active" data-media="all">All</button>
                <button type="button" class="media-filter-btn" data-media="movie">Movies</button>
                <button type="button" class="media-filter-btn" data-media="tv">Shows</button>
            </div>

            <div id="scheduleTimelineStream" class="schedule-timeline-stream"></div>

            <div id="timelineScrollLoader" class="timeline-scroll-loader d-none">
                <div class="spinner-border text-light spinner-border-sm" role="status"></div>
                <span class="text-muted ms-2 small">Loading more releases...</span>
            </div>
        </main>
    </div>
</div>

<script>
    window.MoctaleConfig = {
        scheduleFeedUrl: "{% url 'schedule_feed_api' %}"
    };
</script>
<script src="{% static 'js/schedule.js' %}"></script>
{% endblock %}
