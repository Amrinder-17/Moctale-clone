{% extends "layout.html" %}
{% load static %}


{% block extra_css %}
    <link rel="stylesheet" href="{% static 'movies/style.css' %}">
{% endblock %}

{% block content %}
<div class="schedule-page-container">
    
    <div class="schedule-header">
        <h1 class="fw-bold text-white mb-2">Release Schedule</h1>
        <p class="text-muted">Track theatrical premieres and upcoming streaming network drops curated inside your territory.</p>
    </div>

    <div class="source-filter-row mb-5">
        <button class="source-tab-btn active" data-source="cinemas"><i class="bi bi-ticket-perforated me-2"></i>In Cinemas</button>
        <button class="source-tab-btn" data-source="netflix"><i class="bi bi-play-circle me-2"></i>Netflix</button>
        <button class="source-tab-btn" data-source="crunchyroll"><i class="bi bi-lightning-charge me-2"></i>Crunchyroll</button>
        <button class="source-tab-btn" data-source="prime"><i class="bi bi-amazon me-2"></i>Prime Video</button>
    </div>

    <div id="scheduleTimelineStream" class="schedule-timeline-stream">
        </div>

    <div id="timelineScrollLoader" class="timeline-scroll-loader text-center py-4 hidden">
        <div class="spinner-border text-light spinner-border-sm" role="status"></div>
        <span class="text-muted ms-2 small">Slicing next schedule rows...</span>
    </div>

</div>

<script>
        window.MoctaleConfig = {
            scheduleFeedUrl: "{% url 'schedule_feed_api' %}"
        };
    </script>

    <script src="{% static 'js/schedule.js' %}"></script>
{% endblock %}
