{% extends "layout.html" %}
{% load static %}
{% block extra_css %}
<link href="{% static 'style.css' %}?v=1.1" rel="stylesheet">
{% endblock %}
{% block content %}
<div class="auth-container">
    <h2>Join Moctale</h2>
    <form method="POST">
        {% csrf_token %} {{ form.as_p }} <button type="submit">Sign Up</button>
    </form>
    <p>Already have an account? <a href="{% url 'login' %}">Log In</a></p>
</div>
{% endblock  %}
