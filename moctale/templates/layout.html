{% load static %}
<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block  title %}Moctale{% endblock  %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="{% static 'style.css' %}?v=1.1" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body >
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom border-body-secondary">
      <div class="container-fluid">
        <div class="d-flex align-items-center">
          <img src="{% static 'moctale-logo.png' %}" alt="Moctale Logo" style="height: 40px; margin-right: 10px;">
          <a class="navbar-brand mb-0" href="#">Moctale</a>
        </div>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <div class="ms-auto d-flex gap-2">
            <a href="#" class="btn btn-dark">Sign Up</a>
            <a href="#" class="btn" style="background-color: #001f3f; color: white;">Login</a>
          </div>
        </div>
      </div>
    </nav>
    <div class='container '>
        {% block content %}{% endblock  %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
